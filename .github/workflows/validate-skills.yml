name: validate-skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'vendored/**'
      - '.claude-plugin/**'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate SKILL.md frontmatter (agentskills.io spec)
        run: |
          set -e
          shopt -s globstar nullglob
          FILES=(skills/**/SKILL.md vendored/**/SKILL.md)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No SKILL.md files found — nothing to validate."
            exit 0
          fi
          for f in "${FILES[@]}"; do
            echo "Validating $f"
            npx -y @agentskills/skills-ref validate "$(dirname "$f")"
          done

      - name: Validate marketplace.json
        run: |
          set -e
          if [ -f .claude-plugin/marketplace.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json'))"
            echo "marketplace.json is valid JSON"
          fi

      - name: Check skill name == directory name
        run: |
          set -e
          shopt -s globstar nullglob
          FAIL=0
          for f in skills/**/SKILL.md; do
            DIR=$(basename "$(dirname "$f")")
            NAME=$(awk '/^name:/ {print $2; exit}' "$f")
            if [ "$DIR" != "$NAME" ]; then
              echo "::error file=$f::skill name '$NAME' does not match directory '$DIR'"
              FAIL=1
            fi
          done
          exit $FAIL
