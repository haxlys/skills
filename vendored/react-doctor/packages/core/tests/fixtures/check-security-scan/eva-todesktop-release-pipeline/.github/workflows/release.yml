name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pnpm install
        env:
          FIREBASE_ADMIN_KEY: ${{ secrets.FIREBASE_ADMIN_KEY }}
          UPDATE_SIGNING_TOKEN: ${{ secrets.UPDATE_SIGNING_TOKEN }}
      - run: pnpm release
